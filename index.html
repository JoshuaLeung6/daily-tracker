<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Fitness Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="A low-pressure personal fitness ledger">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitness">
  <meta name="theme-color" content="#16130e">
  <script>
    // Apply the saved theme before first paint (js/theme.js takes over after
    // load). Reads the same pcal:theme key the store owns.
    (function () {
      var pref = null;
      try { pref = localStorage.getItem('pcal:theme'); } catch (e) { /* default below */ }
      var theme = pref === 'light' || pref === 'dark'
        ? pref
        : (pref === 'system' && matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.dataset.theme = theme;
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = theme === 'light' ? '#f6f0e3' : '#16130e';
    })();
  </script>
  <link rel="apple-touch-icon" href="./icons/icon-180.png">
  <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="storage-banner" class="banner" role="alert" hidden></div>
  <div id="saved-flash" class="saved-flash" aria-hidden="true">Saved</div>

  <main id="views">
    <section id="view-day" class="view" aria-label="Day"></section>
    <section id="view-week" class="view" aria-label="Week" hidden></section>
    <section id="view-month" class="view" aria-label="Month" hidden></section>
    <section id="view-stats" class="view" aria-label="Stats" hidden></section>
    <section id="view-settings" class="view" aria-label="Settings" hidden></section>
  </main>

  <nav class="tabbar" aria-label="Views">
    <button class="tab" data-tab="day" aria-current="page">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="8" y1="3" x2="8" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="16" y1="3" x2="16" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="14" r="2.4" fill="currentColor"/></svg>
      <span>Day</span>
    </button>
    <button class="tab" data-tab="week">
      <svg viewBox="0 0 24 24" aria-hidden="true"><line x1="4" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="4" y1="18" x2="14" y2="18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Week</span>
    </button>
    <button class="tab" data-tab="month">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/><line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="14" r="1.3" fill="currentColor"/><circle cx="15" cy="14" r="1.3" fill="currentColor"/><circle cx="9" cy="17.2" r="1.3" fill="currentColor"/></svg>
      <span>Month</span>
    </button>
    <button class="tab" data-tab="stats">
      <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="13" width="3.6" height="7" rx="1" fill="currentColor"/><rect x="10.2" y="8" width="3.6" height="12" rx="1" fill="currentColor"/><rect x="16.4" y="4" width="3.6" height="16" rx="1" fill="currentColor"/></svg>
      <span>Stats</span>
    </button>
    <button class="tab" data-tab="settings">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 4v2.2M12 17.8V20M4 12h2.2M17.8 12H20M6.3 6.3l1.6 1.6M16.1 16.1l1.6 1.6M17.7 6.3l-1.6 1.6M7.9 16.1l-1.6 1.6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
